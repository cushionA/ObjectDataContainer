name: Update package branch

on:
  push:
    branches: [main]
    paths:
      - 'Assets/com.zabuton.container-pack/**'

jobs:
  update-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update package branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or update package branch
          git checkout package 2>/dev/null || git checkout --orphan package

          # Remove everything
          git rm -rf . 2>/dev/null || true
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Checkout package contents from main
          git checkout main -- Assets/com.zabuton.container-pack/

          # Move to root (exclude .meta files from Assets/ level)
          cd Assets/com.zabuton.container-pack
          find . -maxdepth 1 -not -name '.' -not -name '..' | while read item; do
            cp -r "$item" ../../"$(basename "$item")"
          done
          cd ../..
          rm -rf Assets/

          # Commit and push
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to package"
          else
            git commit -m "chore: sync package from main $(git log main -1 --format='%h')"
            git push origin package --force-with-lease
          fi
